<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Mark's Fade</title>
  <link rel="stylesheet" href="css/auth.css" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      background: radial-gradient(circle at 20% 30%, #0a0a0a, #030303);
      font-family: 'Barlow', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .reset-container {
      max-width: 480px;
      width: 90%;
      margin: 40px auto;
    }
    .auth-card {
      background: rgba(10, 10, 10, 0.95);
      backdrop-filter: blur(12px);
      border-radius: 28px;
      padding: 32px 28px;
      border: 1px solid rgba(224, 48, 48, 0.2);
      box-shadow: 0 25px 45px rgba(0,0,0,0.5), 0 0 0 1px rgba(224,48,48,0.1);
    }
    .brand {
      text-align: center;
      margin-bottom: 32px;
    }
    .brand-name {
      font-family: 'Bebas Neue', cursive;
      font-size: 32px;
      letter-spacing: 3px;
      margin: 12px 0 4px;
      color: white;
    }
    .brand-name span { color: #e03030; }
    .brand-tagline {
      font-size: 10px;
      letter-spacing: 2px;
      color: #888;
    }
    .field {
      margin-bottom: 20px;
    }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      color: #aaa;
      margin-bottom: 8px;
    }
    .input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .input-wrap input {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 14px;
      padding: 14px 40px 14px 40px;
      color: white;
      font-size: 14px;
      transition: all 0.2s;
    }
    .input-wrap input:focus {
      outline: none;
      border-color: #e03030;
      background: #1f1f1f;
    }
    .input-icon {
      position: absolute;
      left: 14px;
      width: 18px;
      height: 18px;
      color: #666;
    }
    .toggle-pw {
      position: absolute;
      right: 14px;
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      color: #666;
    }
    .toggle-pw svg { width: 18px; height: 18px; }
    .hidden { display: none; }
    .strength-meter {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 8px;
    }
    .strength-bars {
      display: flex;
      gap: 4px;
      flex: 1;
    }
    .strength-bar {
      flex: 1;
      height: 4px;
      border-radius: 2px;
      background: #2a2a2a;
    }
    .strength-label {
      font-size: 11px;
      font-weight: 600;
      min-width: 42px;
      text-align: right;
    }
    .btn-red {
      width: 100%;
      background: #e03030;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 40px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 1.5px;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 12px;
    }
    .btn-red:hover { background: #c02020; transform: scale(0.98); }
    .field-error {
      font-size: 11px;
      color: #e03030;
      margin-top: 6px;
      display: block;
    }
    .reset-sent {
      text-align: center;
      padding: 20px 0;
    }
    .reset-sent h3 {
      font-size: 22px;
      color: white;
      margin: 16px 0 8px;
    }
    .reset-sent p {
      color: #999;
      font-size: 14px;
      line-height: 1.6;
    }
    .auth-link {
      color: #e03030;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
    }
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: #1a1a1a;
      color: white;
      padding: 12px 24px;
      border-radius: 40px;
      font-size: 13px;
      z-index: 1000;
      transition: 0.3s;
      opacity: 0;
      border-left: 3px solid #e03030;
    }
    .toast.show {
      transform: translateX(-50%) translateY(0);
      opacity: 1;
    }
    .toast.success { border-left-color: #55cc77; }
  </style>
</head>
<body>
  <div class="reset-container">
    <div class="auth-card">
      <div class="brand">
        <div class="brand-logo" style="text-align:center;">
          <svg viewBox="0 0 60 60" width="50" height="50">
            <circle cx="30" cy="30" r="28" fill="none" stroke="#e03030" stroke-width="1.5"/>
            <circle cx="30" cy="30" r="22" fill="none" stroke="#e03030" stroke-width="0.8" stroke-dasharray="3 3"/>
            <text x="30" y="27" text-anchor="middle" fill="white" font-family="Bebas Neue" font-size="11" letter-spacing="1">MARK'S</text>
            <text x="30" y="39" text-anchor="middle" fill="#e03030" font-family="Bebas Neue" font-size="14" letter-spacing="2">FADE</text>
          </svg>
        </div>
        <h1 class="brand-name">Mark's <span>Fade</span></h1>
        <p class="brand-tagline">RESET YOUR PASSWORD</p>
      </div>

      <div id="reset-form-container">
        <!-- Dynamic content will be inserted here -->
        <div style="text-align: center; color: #888; padding: 40px;">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="#e03030" stroke-width="2">
            <circle cx="12" cy="12" r="10"/>
            <path d="M12 6v6l4 2"/>
          </svg>
          <p>Loading...</p>
        </div>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script src="js/db.js"></script>
  <script>
    // Toast function
    function toast(msg, type = '') {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.className = 'toast show ' + type;
      setTimeout(() => el.className = 'toast', 3500);
    }

    function setErr(id, msg) {
      const el = document.getElementById(id);
      if (el) el.textContent = msg;
    }

    function escHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Password strength meter
    function getPasswordStrength(pw) {
      if (!pw) return { score: 0, label: '', color: '' };
      let score = 0;
      if (pw.length >= 8) score++;
      if (pw.length >= 12) score++;
      if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
      if (/[0-9]/.test(pw)) score++;
      if (/[^A-Za-z0-9]/.test(pw)) score++;
      score = Math.min(4, Math.max(1, score));
      const map = {
        1: { label: 'Weak', color: '#e03030' },
        2: { label: 'Fair', color: '#ddbb44' },
        3: { label: 'Good', color: '#4488dd' },
        4: { label: 'Strong', color: '#55cc77' },
      };
      return { score, ...map[score] };
    }

    // Get token from URL
    const urlParams = new URLSearchParams(window.location.search);
    const resetToken = urlParams.get('token');

    if (!resetToken) {
      // No token - show error
      document.getElementById('reset-form-container').innerHTML = `
        <div class="reset-sent">
          <svg viewBox="0 0 24 24" fill="none" stroke="#e03030" stroke-width="1.5" width="48" height="48">
            <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
          </svg>
          <h3>Invalid Reset Link</h3>
          <p>No reset token provided. Please request a new password reset link.</p>
          <a href="index.html" class="auth-link">← Back to Sign In</a>
        </div>
      `;
    } else {
      // Verify the token
      const check = DB.resetTokens.verify(resetToken);
      
      if (!check.ok) {
        // Invalid or expired token
        document.getElementById('reset-form-container').innerHTML = `
          <div class="reset-sent">
            <svg viewBox="0 0 24 24" fill="none" stroke="#e03030" stroke-width="1.5" width="48" height="48">
              <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/>
            </svg>
            <h3>Link Invalid or Expired</h3>
            <p>${escHtml(check.error)}</p>
            <a href="index.html" class="auth-link">← Back to Sign In</a>
          </div>
        `;
      } else {
        // Valid token - show reset form
        const email = check.email;
        
        document.getElementById('reset-form-container').innerHTML = `
          <p style="color:#888;font-size:13px;margin-bottom:24px;text-align:center;">
            Resetting password for <strong style="color:#e03030">${escHtml(email)}</strong>
          </p>
          <div class="field">
            <label>NEW PASSWORD *</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="11" width="18" height="11" rx="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input type="password" id="reset-password" placeholder="Enter new password"/>
              <button type="button" class="toggle-pw" id="togglePassword">
                <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                  <circle cx="12" cy="12" r="3"/>
                </svg>
                <svg class="eye-closed hidden" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                  <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
                  <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
                  <line x1="1" y1="1" x2="23" y2="23"/>
                </svg>
              </button>
            </div>
            <div id="password-meter" class="strength-meter">
              <div class="strength-bars">
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
                <div class="strength-bar"></div>
              </div>
              <span class="strength-label"></span>
            </div>
            <span class="field-error" id="err-password"></span>
          </div>
          <div class="field">
            <label>CONFIRM PASSWORD *</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="11" width="18" height="11" rx="2"/>
                  <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
              </span>
              <input type="password" id="reset-confirm" placeholder="Confirm new password"/>
            </div>
            <span class="field-error" id="err-confirm"></span>
          </div>
          <button class="btn-red" id="btn-reset-save">SET NEW PASSWORD</button>
          <p style="text-align:center; margin-top:20px;">
            <a href="index.html" class="auth-link">← Back to Sign In</a>
          </p>
        `;

        // Toggle password visibility
        document.getElementById('togglePassword').addEventListener('click', () => {
          const input = document.getElementById('reset-password');
          const open = document.querySelector('#togglePassword .eye-open');
          const closed = document.querySelector('#togglePassword .eye-closed');
          if (input.type === 'password') {
            input.type = 'text';
            open.classList.add('hidden');
            closed.classList.remove('hidden');
          } else {
            input.type = 'password';
            open.classList.remove('hidden');
            closed.classList.add('hidden');
          }
        });

        // Password strength meter
        const pwInput = document.getElementById('reset-password');
        const meter = document.getElementById('password-meter');
        
        pwInput.addEventListener('input', () => {
          const { score, label, color } = getPasswordStrength(pwInput.value);
          const bars = meter.querySelectorAll('.strength-bar');
          const labelEl = meter.querySelector('.strength-label');
          bars.forEach((bar, i) => {
            bar.style.background = i < score ? color : '#2a2a2a';
          });
          if (labelEl) {
            labelEl.textContent = pwInput.value ? label : '';
            labelEl.style.color = color;
          }
        });

        // Handle reset submission
        document.getElementById('btn-reset-save').addEventListener('click', () => {
          const password = document.getElementById('reset-password').value;
          const confirm = document.getElementById('reset-confirm').value;
          let valid = true;

          if (!password || password.length < 6) {
            setErr('err-password', 'Password must be at least 6 characters.');
            valid = false;
          }
          if (password !== confirm) {
            setErr('err-confirm', 'Passwords do not match.');
            valid = false;
          }
          if (!valid) return;

          // Verify token one more time before reset
          const finalCheck = DB.resetTokens.verify(resetToken);
          if (!finalCheck.ok) {
            toast(finalCheck.error, 'error');
            return;
          }

          // Reset the password
          DB.users.resetPassword(finalCheck.email, password);
          DB.resetTokens.consume(resetToken);
          
          // Show success
          document.getElementById('reset-form-container').innerHTML = `
            <div class="reset-sent">
              <svg viewBox="0 0 24 24" fill="none" stroke="#55cc77" stroke-width="1.5" width="48" height="48">
                <polyline points="20 6 9 17 4 12"/>
              </svg>
              <h3>Password Updated!</h3>
              <p>Your password has been changed successfully.</p>
              <a href="index.html" class="btn-red" style="display:inline-flex;justify-content:center;margin-top:8px;text-decoration:none;">GO TO SIGN IN</a>
            </div>
          `;
          toast('Password reset successfully!', 'success');
        });
      }
    }
  </script>
</body>
</html>
